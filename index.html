<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spin Wheel">
<meta name="theme-color" content="#1a2e22">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<title>Spin Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #f0f7f2;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex; flex-direction: column; align-items: center;
    padding-bottom: calc(80px + env(safe-area-inset-bottom));
    color: #1a2e22;
    -webkit-tap-highlight-color: transparent;
    touch-action: pan-y;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  .sw-header {
    width: 100%; max-width: 480px;
    background: linear-gradient(135deg,#1a2e22 0%,#2d5a3d 100%);
    position: sticky; top: 0; z-index: 20;
    box-shadow: 0 4px 20px rgba(26,46,34,.3);
  }
  .sw-topbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; overflow: hidden; }
  .sw-btn-new {
    flex-shrink: 0; display: flex; align-items: center; gap: 5px;
    background: #3db86b; color: white; border: none; border-radius: 20px;
    padding: 7px 16px; font-family: 'Fredoka One', sans-serif; font-size: 15px;
    letter-spacing: .4px;
    cursor: pointer; white-space: nowrap; transition: background .15s;
    -webkit-font-smoothing: antialiased;
  }
  .sw-btn-new:hover { background: #2d9456; }
  .sw-drawer { display: flex; gap: 10px; flex: 1; overflow-x: auto; scrollbar-width: none; align-items: center; padding: 4px 0; }
  .sw-drawer::-webkit-scrollbar { display: none; }
  .sw-chip { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; position: relative; }
  .sw-swatch {
    width: 42px; height: 42px; border-radius: 50%;
    border: 2.5px solid transparent; opacity: .6;
    transition: opacity .15s, transform .15s, border-color .15s;
  }
  .sw-chip:hover .sw-swatch { opacity: .85; transform: translateY(-1px); }
  .sw-chip.active .sw-swatch { opacity: 1; border-color: white; box-shadow: 0 0 0 3px rgba(255,255,255,.2); }
  .sw-chip-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.6); max-width: 52px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sw-chip.active .sw-chip-label { color: white; }
  .sw-edit-badge {
    position: absolute; top: -3px; right: -3px;
    width: 17px; height: 17px; border-radius: 50%;
    background: white; color: #1a2e22; font-size: 9px;
    display: none; align-items: center; justify-content: center;
    border: none; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.2); font-weight: 900;
  }
  .sw-chip.active .sw-edit-badge { display: flex; }

  /* ── TITLE ── */
  .sw-title {
    font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 20px;
    color: #7a9e87; letter-spacing: 2px; text-transform: uppercase;
    text-align: center; margin: 24px 0 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .sw-title-edit {
    background: none; border: none; color: #b0c8b8; font-size: 14px;
    cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: color .15s;
  }
  .sw-title-edit:hover { color: #7a9e87; }

  /* ── WHEEL ── */
  .sw-wheel-area {
    position: relative; display: flex; align-items: center; justify-content: center;
    width: 310px; height: 310px; margin: 16px auto 0;
  }
  .sw-shadow { position: absolute; inset: 10px; border-radius: 50%; box-shadow: 0 12px 40px rgba(0,0,0,.18); pointer-events: none; }
  #wheel { position: relative; z-index: 1; border-radius: 50%; }
  .sw-pointer {
    position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
    z-index: 5; width: 0; height: 0;
    border-left: 12px solid transparent; border-right: 12px solid transparent;
    border-top: 28px solid #1a2e22;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
  }
  .sw-empty {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    background: #e8f5ee; border-radius: 50%; border: 3px dashed #a8d4b8;
    z-index: 2;
  }
  .sw-empty-icon { font-size: 32px; }
  .sw-empty-text { font-size: 13px; font-weight: 700; color: #7a9e87; text-align: center; padding: 0 30px; }

  /* ── RESULT ── */
  .sw-result {
    margin: 14px 16px 0; max-width: 448px; width: calc(100% - 32px);
    background: white; border-radius: 14px; border: 2px solid #3db86b;
    padding: 12px 18px; display: flex; align-items: center; gap: 10px;
    animation: sw-pop .3s cubic-bezier(.34,1.56,.64,1);
  }
  .sw-result.hidden { display: none; }
  @keyframes sw-pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .sw-result-label { font-size: 11px; font-weight: 800; color: #3db86b; letter-spacing: 1px; text-transform: uppercase; }
  .sw-result-text { font-family: 'Fredoka One', sans-serif; font-size: 20px; color: #1a2e22; }
  .sw-result-clear { margin-left: auto; background: none; border: none; font-size: 18px; color: #ccc; cursor: pointer; transition: color .15s; }
  .sw-result-clear:hover { color: #e8515a; }

  /* ── SPIN BTN ── */
  .sw-spin-btn {
    margin: 16px auto 0; display: block;
    background: linear-gradient(135deg,#3db86b 0%,#2d9456 100%);
    color: white; border: none; border-radius: 30px; padding: 16px 48px;
    font-family: 'Fredoka One', sans-serif; font-size: 22px;
    letter-spacing: .6px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(61,184,107,.35), 0 1px 0 rgba(255,255,255,.15) inset;
    transition: transform .15s, box-shadow .15s;
    -webkit-font-smoothing: antialiased;
  }
  .sw-spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(61,184,107,.4); }
  .sw-spin-btn:active:not(:disabled) { transform: translateY(0); }
  .sw-spin-btn:disabled { background: #a8d4b8; box-shadow: none; cursor: not-allowed; }
  .sw-spin-btn.shake { animation: sw-shake .4s ease; }
  @keyframes sw-shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .sw-too-few {
    text-align: center; font-size: 13px; font-weight: 700;
    color: #f47c3c; margin-top: 8px; min-height: 18px; opacity: 0;
    transition: opacity .2s;
  }
  .sw-too-few.visible { opacity: 1; }

  /* ── EDITOR ── */
  .sw-editor {
    background: white; border-radius: 16px; border: 2px solid #d4eadb;
    margin: 14px 16px 0; max-width: 448px; width: calc(100% - 32px); overflow: hidden;
  }
  .sw-editor-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #eaf4ee;
    font-size: 12px; font-weight: 700; color: #7a9e87;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .sw-shuffle-btn {
    background: none; border: none; font-size: 13px; cursor: pointer;
    color: #b0c8b8; transition: color .15s; padding: 2px 6px; border-radius: 4px;
    font-family: 'Nunito', sans-serif; font-weight: 700;
  }
  .sw-shuffle-btn:hover { color: #3db86b; }
  .sw-items { list-style: none; max-height: 240px; overflow-y: auto; }
  .sw-items::-webkit-scrollbar { width: 4px; }
  .sw-items::-webkit-scrollbar-thumb { background: #d4eadb; border-radius: 4px; }
  .sw-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; border-bottom: 1px solid #f3f9f5;
    font-size: 15px; font-weight: 600; transition: background .1s; cursor: grab;
  }
  .sw-item:hover { background: #f7fcf9; }
  .sw-item.drag-over { background: #e8f5ee; }
  .sw-drag-handle { color: #ccc; font-size: 14px; cursor: grab; user-select: none; flex-shrink: 0; }
  .sw-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sw-item-text { flex: 1; cursor: text; }
  .sw-item-edit-input {
    flex: 1; border: none; border-bottom: 2px solid #3db86b;
    font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
    color: #1a2e22; outline: none; background: transparent; padding: 1px 0;
  }
  .sw-del {
    background: none; border: none; font-size: 16px; color: #ddd;
    cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1;
    transition: color .15s; flex-shrink: 0;
  }
  .sw-del:hover { color: #e8515a; }
  .sw-add-row { display: flex; gap: 8px; padding: 10px 14px; }
  .sw-input {
    flex: 1; border: 1.5px solid #d4eadb; border-radius: 10px;
    padding: 8px 12px; font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 600; outline: none; color: #1a2e22; transition: border-color .15s;
  }
  .sw-input:focus { border-color: #3db86b; }
  .sw-btn-add {
    background: #3db86b; color: white; border: none; border-radius: 10px;
    padding: 8px 18px; font-family: 'Fredoka One', sans-serif; font-size: 15px;
    letter-spacing: .3px; cursor: pointer; transition: background .15s;
    -webkit-font-smoothing: antialiased;
  }
  .sw-btn-add:hover { background: #2d9456; }

  /* ── MODAL ── */
  .sw-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .sw-overlay.open { opacity: 1; pointer-events: all; }
  .sw-modal {
    background: white; border-radius: 20px; padding: 28px 24px 24px;
    width: 100%; max-width: 340px; box-shadow: 0 20px 60px rgba(0,0,0,.25);
    transform: translateY(14px); transition: transform .2s;
  }
  .sw-overlay.open .sw-modal { transform: translateY(0); }
  .sw-modal h2 { font-family: 'Fredoka One', sans-serif; font-size: 22px; color: #1a2e22; margin-bottom: 16px; }
  .sw-modal-input {
    width: 100%; border: 2px solid #d4eadb; border-radius: 12px;
    padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
    outline: none; color: #1a2e22; margin-bottom: 16px; transition: border-color .15s;
  }
  .sw-modal-input:focus { border-color: #3db86b; }
  .sw-modal-actions { display: flex; gap: 10px; }
  .sw-modal-actions button {
    flex: 1; padding: 12px; border-radius: 12px; border: none;
    font-family: 'Fredoka One', sans-serif; font-size: 17px;
    letter-spacing: .4px; cursor: pointer; transition: background .15s;
    -webkit-font-smoothing: antialiased;
  }
  .sw-btn-cancel { background: #f0f7f2; color: #7a9e87; }
  .sw-btn-cancel:hover { background: #e0efea; }
  .sw-btn-confirm { background: #3db86b; color: white; }
  .sw-btn-confirm:hover { background: #2d9456; }
  .sw-btn-delete {
    margin-top: 12px; width: 100%; padding: 11px; border-radius: 12px;
    border: 2px solid #fdd; background: #fff5f5; color: #e8515a;
    font-family: 'Fredoka One', sans-serif; font-size: 15px; cursor: pointer; transition: background .15s;
  }
  .sw-btn-delete:hover { background: #ffe4e4; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="sw-header">
  <div class="sw-topbar">
    <div class="sw-drawer" id="drawer"></div>
    <button class="sw-btn-new" id="btnNew">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round">
        <line x1="12" y1="4" x2="12" y2="20"/><line x1="4" y1="12" x2="20" y2="12"/>
      </svg>
      New
    </button>
  </div>
</div>

<!-- TITLE -->
<div class="sw-title">
  <span id="wheelTitle"></span>
  <button class="sw-title-edit" id="btnTitleEdit" title="Edit wheel name">✎</button>
</div>

<!-- WHEEL -->
<div class="sw-wheel-area">
  <div class="sw-shadow"></div>
  <div class="sw-empty" id="emptyState">
    <div class="sw-empty-icon">🎡</div>
    <div class="sw-empty-text">Add items below to get spinning!</div>
  </div>
  <canvas id="wheel" width="310" height="310"></canvas>
  <div class="sw-pointer"></div>
</div>

<!-- RESULT -->
<div class="sw-result hidden" id="resultBanner">
  <div>
    <div class="sw-result-label">Last spin</div>
    <div class="sw-result-text" id="resultText"></div>
  </div>
  <button class="sw-result-clear" id="resultClear">×</button>
</div>

<!-- SPIN -->
<button class="sw-spin-btn" id="spinBtn">Spin the Wheel</button>
<div class="sw-too-few" id="tooFew">Add at least 2 items to spin</div>

<!-- EDITOR -->
<div class="sw-editor">
  <div class="sw-editor-head">
    <span id="itemCount">Items (0)</span>
    <button class="sw-shuffle-btn" id="btnShuffle">🔀 Shuffle</button>
  </div>
  <ul class="sw-items" id="itemsList"></ul>
  <div class="sw-add-row">
    <input class="sw-input" id="newItemInput" placeholder="Add new item…" maxlength="40">
    <button class="sw-btn-add" id="btnAdd">Add</button>
  </div>
</div>

<!-- MODAL -->
<div class="sw-overlay" id="overlay">
  <div class="sw-modal">
    <h2 id="modalTitle">New Wheel</h2>
    <input class="sw-modal-input" id="modalInput" placeholder="Wheel name…" maxlength="30">
    <div class="sw-modal-actions">
      <button class="sw-btn-cancel" id="btnCancel">Cancel</button>
      <button class="sw-btn-confirm" id="btnConfirm">Create</button>
    </div>
    <button class="sw-btn-delete" id="btnDeleteWheel" style="display:none">🗑 Delete this wheel</button>
  </div>
</div>

<script>
const PALETTE = [
  '#e8515a','#f47c3c','#f5c842','#3db86b','#4a90d9',
  '#9b59b6','#e91e8c','#00bcd4','#ff7043','#8bc34a',
  '#795548','#607d8b','#e8515a','#3db86b','#f5c842',
  '#4a90d9','#9b59b6','#f47c3c','#00bcd4','#8bc34a',
];
const SWATCHES = [
  ['#e8515a','#f47c3c','#f5c842','#3db86b'],
  ['#4a90d9','#9b59b6','#e91e8c','#00bcd4'],
  ['#3db86b','#f5c842','#4a90d9','#e8515a'],
  ['#f47c3c','#8bc34a','#607d8b','#e91e8c'],
  ['#9b59b6','#e8515a','#00bcd4','#f5c842'],
];

const DEFAULT_WHEELS = [
  { name: 'Stuff to do', items: ['Städa köket','Fixa disken','Plocka undan på bordet','Städa hallen','Släng soporna','Dammsug 1 rum','Städa badrum','Städa toaletten','Städa vardagsrum','Sortera tvätt','Städa matsal','Städa sovrum','Gör matlådor','Baka något','30 min promenad','Städa skrivbord'] },
  { name: 'Middag?', items: ['Pizza','Pasta','Soppa','Tacos','Sushi','Sallad','Gryta','Hamburgare'] },
];

function load() {
  try {
    const saved = localStorage.getItem('sw_wheels');
    const savedIdx = localStorage.getItem('sw_activeIdx');
    if (saved) {
      wheels = JSON.parse(saved);
      activeIdx = parseInt(savedIdx) || 0;
      if (activeIdx >= wheels.length) activeIdx = 0;
    }
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem('sw_wheels', JSON.stringify(wheels));
    localStorage.setItem('sw_activeIdx', activeIdx);
  } catch(e) {}
}

let wheels = DEFAULT_WHEELS;
let activeIdx = 0;
let angle = 0;
let spinning = false;
let modalMode = 'create';
let dragSrc = null;

// DOM
const canvas      = document.getElementById('wheel');
const ctx         = canvas.getContext('2d');
const drawer      = document.getElementById('drawer');
const wheelTitle  = document.getElementById('wheelTitle');
const emptyState  = document.getElementById('emptyState');
const resultBanner= document.getElementById('resultBanner');
const resultText  = document.getElementById('resultText');
const resultClear = document.getElementById('resultClear');
const spinBtn     = document.getElementById('spinBtn');
const tooFewEl    = document.getElementById('tooFew');
const itemsList   = document.getElementById('itemsList');
const itemCount   = document.getElementById('itemCount');
const newItemInput= document.getElementById('newItemInput');
const overlay     = document.getElementById('overlay');
const modalTitleEl= document.getElementById('modalTitle');
const modalInput  = document.getElementById('modalInput');
const btnConfirm  = document.getElementById('btnConfirm');
const btnDeleteWheel = document.getElementById('btnDeleteWheel');

function items() { return wheels[activeIdx].items; }

// ── DRAW ──
function drawWheel() {
  const n = items().length;
  emptyState.style.display = n === 0 ? 'flex' : 'none';
  tooFewEl.classList.toggle('visible', n < 2);
  itemCount.textContent = `Items (${n})`;

  // Hi-DPI / retina fix
  const dpr = window.devicePixelRatio || 1;
  const size = 310;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);

  ctx.clearRect(0, 0, size, size);
  if (!n) return;
  const cx = size/2, cy = size/2, r = cx - 4;
  const arc = (2*Math.PI)/n;
  items().forEach((item, i) => {
    const start = angle + i*arc - Math.PI/2;
    const end = start + arc;
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end); ctx.closePath();
    ctx.fillStyle = PALETTE[i%PALETTE.length]; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.save();
    ctx.translate(cx,cy); ctx.rotate(start+arc/2);
    ctx.textAlign='right'; ctx.fillStyle='white';
    const fontSize = Math.min(14, Math.max(9, 200/n));
    ctx.font=`800 ${fontSize}px Nunito`;
    ctx.shadowColor='rgba(0,0,0,.55)';
    ctx.shadowBlur=4;
    ctx.shadowOffsetX=0;
    ctx.shadowOffsetY=1;
    // tighter truncation based on available space
    const maxChars = Math.max(8, Math.floor(30 - n * 0.4));
    const lbl = item.length>maxChars ? item.slice(0,maxChars-1)+'…' : item;
    ctx.fillText(lbl, r-10, fontSize*0.38);
    ctx.restore();
  });
  ctx.beginPath(); ctx.arc(cx,cy,9,0,2*Math.PI);
  ctx.fillStyle='rgba(255,255,255,.9)'; ctx.fill();
}

// ── SPIN ──
spinBtn.addEventListener('click', () => {
  if (items().length < 2) {
    spinBtn.classList.add('shake');
    setTimeout(() => spinBtn.classList.remove('shake'), 500);
    return;
  }
  if (spinning) return;
  spinning = true;
  spinBtn.disabled = true;
  spinBtn.textContent = 'Spinning…';
  resultBanner.classList.add('hidden');

  const target = angle + (5+Math.random()*5)*2*Math.PI;
  const dur = 3500+Math.random()*1500;
  const t0 = performance.now(), a0 = angle;
  const ease = t => 1-Math.pow(1-t,4);

  (function frame(now) {
    const t = Math.min((now-t0)/dur, 1);
    angle = a0 + ease(t)*(target-a0);
    drawWheel();
    if (t < 1) { requestAnimationFrame(frame); return; }
    angle = target%(2*Math.PI);
    spinning = false;
    spinBtn.disabled = false;
    spinBtn.textContent = 'Spin the Wheel';
    // result
    const arc = (2*Math.PI)/items().length;
    const norm = ((-angle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
    const idx = Math.floor(norm/arc)%items().length;
    resultText.textContent = '🎉 '+items()[idx];
    resultBanner.classList.remove('hidden');
    resultBanner.style.animation = 'none';
    requestAnimationFrame(() => { resultBanner.style.animation = ''; });
  })(t0);
});

resultClear.addEventListener('click', () => resultBanner.classList.add('hidden'));

// ── DRAWER ──
function swatchBg(i) {
  const c = SWATCHES[i%SWATCHES.length];
  return `conic-gradient(${c[0]} 0 25%,${c[1]} 25% 50%,${c[2]} 50% 75%,${c[3]} 75%)`;
}

function renderDrawer() {
  drawer.innerHTML = '';
  wheels.forEach((w,i) => {
    const chip = document.createElement('div');
    chip.className = 'sw-chip'+(i===activeIdx?' active':'');
    const swatch = document.createElement('div');
    swatch.className = 'sw-swatch';
    swatch.style.background = swatchBg(i);
    const label = document.createElement('span');
    label.className = 'sw-chip-label';
    label.textContent = w.name;
    const badge = document.createElement('button');
    badge.className = 'sw-edit-badge';
    badge.textContent = '✎';
    badge.addEventListener('click', e => { e.stopPropagation(); openModal('edit'); });
    chip.append(swatch, label, badge);
    chip.addEventListener('click', () => switchWheel(i));
    drawer.appendChild(chip);
  });
}

function switchWheel(idx) {
  if (idx === activeIdx) return;
  activeIdx = idx;
  angle = 0;
  resultBanner.classList.add('hidden');
  wheelTitle.textContent = wheels[activeIdx].name;
  save();
  renderDrawer();
  renderItems();
  drawWheel();
}

// ── ITEMS ──
function renderItems() {
  itemsList.innerHTML = '';
  items().forEach((item, i) => {
    const li = document.createElement('li');
    li.className = 'sw-item';
    li.draggable = true;
    li.dataset.idx = i;

    const handle = document.createElement('span');
    handle.className = 'sw-drag-handle'; handle.textContent = '⠿';

    const dot = document.createElement('span');
    dot.className = 'sw-dot';
    dot.style.background = PALETTE[i%PALETTE.length];

    const text = document.createElement('span');
    text.className = 'sw-item-text';
    text.textContent = item;
    text.title = 'Double-click to edit';
    text.addEventListener('dblclick', () => startInlineEdit(li, i, text));

    const del = document.createElement('button');
    del.className = 'sw-del'; del.textContent = '×';
    del.addEventListener('click', () => {
      wheels[activeIdx].items.splice(i, 1);
      save();
      renderItems(); drawWheel();
    });

    li.append(handle, dot, text, del);

    // drag events
    li.addEventListener('dragstart', () => { dragSrc = i; li.style.opacity = '.4'; });
    li.addEventListener('dragend', () => { li.style.opacity = '1'; });
    li.addEventListener('dragover', e => { e.preventDefault(); li.classList.add('drag-over'); });
    li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
    li.addEventListener('drop', e => {
      e.preventDefault(); li.classList.remove('drag-over');
      if (dragSrc === null || dragSrc === i) return;
      const arr = wheels[activeIdx].items;
      const [moved] = arr.splice(dragSrc, 1);
      arr.splice(i, 0, moved);
      dragSrc = null;
      save();
      renderItems(); drawWheel();
    });

    itemsList.appendChild(li);
  });
  itemCount.textContent = `Items (${items().length})`;
}

// inline edit
function startInlineEdit(li, idx, textSpan) {
  const input = document.createElement('input');
  input.className = 'sw-item-edit-input';
  input.value = items()[idx];
  li.replaceChild(input, textSpan);
  input.focus();
  function commit() {
    const val = input.value.trim();
    if (val) wheels[activeIdx].items[idx] = val;
    save();
    renderItems(); drawWheel();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key==='Enter') { input.blur(); }
    if (e.key==='Escape') { renderItems(); }
  });
}

// add item
document.getElementById('btnAdd').addEventListener('click', addItem);
newItemInput.addEventListener('keydown', e => { if (e.key==='Enter') addItem(); });
function addItem() {
  const val = newItemInput.value.trim();
  if (!val) return;
  wheels[activeIdx].items.push(val);
  newItemInput.value = '';
  save();
  renderItems(); drawWheel();
}

// shuffle
document.getElementById('btnShuffle').addEventListener('click', () => {
  wheels[activeIdx].items.sort(() => Math.random()-.5);
  save();
  renderItems(); drawWheel();
});

// ── MODAL ──
function openModal(mode) {
  modalMode = mode;
  if (mode==='create') {
    modalTitleEl.textContent = 'New Wheel';
    modalInput.value = '';
    btnConfirm.textContent = 'Create';
    btnDeleteWheel.style.display = 'none';
  } else {
    modalTitleEl.textContent = 'Edit Wheel';
    modalInput.value = wheels[activeIdx].name;
    btnConfirm.textContent = 'Save';
    btnDeleteWheel.style.display = wheels.length>1 ? 'block' : 'none';
  }
  overlay.classList.add('open');
  setTimeout(() => modalInput.focus(), 100);
}
function closeModal() { overlay.classList.remove('open'); }

document.getElementById('btnNew').addEventListener('click', () => openModal('create'));
document.getElementById('btnTitleEdit').addEventListener('click', () => openModal('edit'));
document.getElementById('btnCancel').addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target===overlay) closeModal(); });
modalInput.addEventListener('keydown', e => { if (e.key==='Enter') btnConfirm.click(); });

btnConfirm.addEventListener('click', () => {
  const name = modalInput.value.trim();
  if (!name) return;
  if (modalMode==='create') {
    wheels.push({ name, items: [] });
    activeIdx = wheels.length-1;
    angle = 0;
    setTimeout(() => drawer.scrollTo({ left: 9999, behavior: 'smooth' }), 80);
  } else {
    wheels[activeIdx].name = name;
  }
  wheelTitle.textContent = wheels[activeIdx].name;
  resultBanner.classList.add('hidden');
  save();
  renderDrawer(); renderItems(); drawWheel();
  closeModal();
});

btnDeleteWheel.addEventListener('click', () => {
  if (wheels.length<=1) return;
  wheels.splice(activeIdx, 1);
  activeIdx = Math.max(0, activeIdx-1);
  angle = 0;
  wheelTitle.textContent = wheels[activeIdx].name;
  resultBanner.classList.add('hidden');
  save();
  renderDrawer(); renderItems(); drawWheel();
  closeModal();
});

// ── INIT ──
load();
wheelTitle.textContent = wheels[activeIdx].name;
renderDrawer();
renderItems();
drawWheel();

// ── TOUCH DRAG FOR ITEM REORDER ──
let touchDragSrc = null;
let touchClone = null;

itemsList.addEventListener('touchstart', e => {
  const li = e.target.closest('li.sw-item');
  if (!li || e.target.classList.contains('sw-del')) return;
  touchDragSrc = parseInt(li.dataset.idx);
  // create visual clone
  touchClone = li.cloneNode(true);
  touchClone.style.cssText = `position:fixed;opacity:.8;pointer-events:none;z-index:999;width:${li.offsetWidth}px;background:white;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);`;
  document.body.appendChild(touchClone);
  const r = li.getBoundingClientRect();
  touchClone.style.top = r.top + 'px';
  touchClone.style.left = r.left + 'px';
  li.style.opacity = '.3';
}, { passive: true });

itemsList.addEventListener('touchmove', e => {
  if (touchDragSrc === null || !touchClone) return;
  e.preventDefault();
  const t = e.touches[0];
  touchClone.style.top = (t.clientY - 24) + 'px';
  touchClone.style.left = touchClone.style.left;
  // find which li we're hovering over
  touchClone.style.display = 'none';
  const el = document.elementFromPoint(t.clientX, t.clientY);
  touchClone.style.display = '';
  const overLi = el && el.closest('li.sw-item');
  document.querySelectorAll('.sw-item').forEach(l => l.classList.remove('drag-over'));
  if (overLi) overLi.classList.add('drag-over');
}, { passive: false });

itemsList.addEventListener('touchend', e => {
  if (touchDragSrc === null) return;
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.sw-item').forEach(l => {
    l.style.opacity = '';
    l.classList.remove('drag-over');
  });
  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const overLi = el && el.closest('li.sw-item');
  if (overLi) {
    const targetIdx = parseInt(overLi.dataset.idx);
    if (targetIdx !== touchDragSrc) {
      const arr = wheels[activeIdx].items;
      const [moved] = arr.splice(touchDragSrc, 1);
      arr.splice(targetIdx, 0, moved);
      save();
      renderItems(); drawWheel();
    }
  }
  touchDragSrc = null;
});

// ── SERVICE WORKER (PWA) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('SW registered:', r.scope))
      .catch(e => console.log('SW failed:', e));
  });
}
</script>
